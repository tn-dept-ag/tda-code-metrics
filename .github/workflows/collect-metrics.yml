name: Collect Code Metrics

on:
  workflow_dispatch:

  schedule:
    # Runs every Monday at 6:00 AM UTC.
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# This controls the default GITHUB_TOKEN only.
# Repository read/write is handled by the GitHub App token below.
permissions:
  contents: read

jobs:
  collect-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: tn-dept-ag
          permission-contents: write

      - name: Check out metrics repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Get GitHub App bot user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Install cloc
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Sync main, discover repos, collect metrics, commit, and push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euxo pipefail

          generate_metrics_commit() {
            git fetch origin main
            git checkout -B main origin/main

            rm -rf .cache/repos

            gh repo list tn-dept-ag \
              --limit 1000 \
              --no-archived \
              --source \
              --json nameWithOwner \
              --jq '.[].nameWithOwner' \
              | sort -u > config/repos.txt

            echo "Repositories selected for tracking:"
            cat config/repos.txt

            python scripts/collect_metrics.py \
              --repo-list config/repos.txt \
              --workspace .cache/repos \
              --output data \
              --author-email colin.stiles@tn.gov \
              --author-email colintimothystiles@gmail.com \
              --since 2026-01-01

            mkdir -p docs/data
            cp data/*.csv docs/data/

            git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
            git config user.email "${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

            git add config/repos.txt data/*.csv docs/data/*.csv

            if git diff --cached --quiet; then
              echo "No metrics changes to commit"
              return 1
            fi

            git commit -m "Update code metrics"
            return 0
          }

          if ! generate_metrics_commit; then
            exit 0
          fi

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            echo "Push failed on attempt ${attempt}; regenerating from latest origin/main"
            sleep 5

            if ! generate_metrics_commit; then
              exit 0
            fi
          done

          git push origin HEAD:main